<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>상담 대시보드</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f9fafb;
            margin: 0;
            padding: 0;
            color: #1f2937;
        }

        .dashboard-container {
            max-width: 800px;
            margin: 60px auto;
            /* 위아래 여백 + 가운데 정렬 */
            padding: 0 20px;
            /* 좌우 여백 */
        }

        h1 {
            font-size: 28px;
            color: #111827;
            margin-bottom: 30px;
            text-align: center;
        }

        #room-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #room-list li {
            background-color: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
        }

        a {
            text-decoration: none;
            color: #2563eb;
            font-weight: 500;
            margin-right: 12px;
        }

        a:hover {
            text-decoration: underline;
        }

        button {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #dc2626;
        }

        .button-enter {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-right: 10px;
            transition: background-color 0.2s;
        }

        .button-enter:hover {
            background-color: #2563eb;
        }
    </style>

</head>

<body>
    <div class="dashboard-container">
        <h1>상담 대기 목록</h1>
        <ul id="room-list">
            {% for room in active_rooms %}
            <li id="room-{{ room }}">
                방 ID: {{ room }}
                <span>
                    <button class="button-enter" onclick="enterRoom('{{ room }}')">입장</button>
                    <button onclick="completeChat('{{ room }}')">상담 완료</button>
                  </span>
                  
            </li>
            {% empty %}
            <li>현재 상담 대기 방이 없습니다.</li>
            {% endfor %}
        </ul>
    </div>


    <script>
        function loadRooms() {
            fetch("/consult_app/agent/dashboard/rooms/")
                .then(response => response.json())
                .then(data => {
                    const roomList = document.getElementById("room-list");
                    roomList.innerHTML = "";

                    if (data.rooms.length === 0) {
                        roomList.innerHTML = "<li>현재 상담 대기 방이 없습니다.</li>";
                        return;
                    }

                    data.rooms.forEach(room => {
                        const li = document.createElement("li");
                        li.id = `room-${room}`;
                        li.innerHTML = `
                            방 ID: ${room}
                            <a href="/consult_app/agent/${room}/" target="_blank">[입장]</a>
                            <button onclick="completeChat('${room}')">[상담 완료]</button>
                        `;
                        roomList.appendChild(li);
                    });
                });
        }

        function completeChat(roomName) {
            fetch(`/consult_app/agent/complete/${roomName}/`)
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        loadRooms();  // 완료 후 새로 불러오기
                    } else {
                        alert(data.message);
                    }
                });
        }

        // 3초마다 방 목록 새로고침
        setInterval(loadRooms, 3000);

        // 처음 진입 시에도 한 번 호출
        loadRooms();

        // 상담 입장 버튼
        function enterRoom(roomName) {
    const url = `/consult_app/agent/${roomName}/`;
    window.open(url, "_blank");
}

    </script>

</body>

</html>
