<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>실시간 상담</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h2 {
            text-align: center;
        }
        #chat-log {
            width: 100%;
            height: 400px;
            border: 1px solid #ccc;
            background-color: #fff;
            overflow-y: scroll;
            padding: 10px;
            margin-bottom: 10px;
        }
        .message {
            max-width: 60%;
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 20px;
            clear: both;
        }
        .user {
            background-color: #dcf8c6;
            float: right;
            text-align: right;
        }
        .agent {
            background-color: #e3e3e3;
            float: left;
            text-align: left;
        }
        #input-container {
            display: flex;
            gap: 10px;
        }
        #chat-message-input {
            flex-grow: 1;
            padding: 10px;
            font-size: 16px;
        }
        #chat-message-submit {
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
<h2>상담방: {{ room_name }}</h2>

<div id="chat-log"></div>

<div id="input-container">
    <input id="chat-message-input" type="text" placeholder="메시지를 입력하세요">
    <button id="chat-message-submit">보내기</button>
</div>

<script>
    const roomName = "{{ room_name }}";
    const chatSocket = new WebSocket(
        'ws://' + window.location.host + '/ws/chat/' + roomName + '/'
    );

    // Django 템플릿에서 is_agent가 True면 agent, 아니면 user
    const role = "{{ is_agent|default:False }}" === "True" ? "agent" : "user";

    chatSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        const chatLog = document.querySelector('#chat-log');
        const messageDiv = document.createElement('div');

        // 내가 보낸 메시지는 오른쪽 (user), 상대방은 왼쪽 (agent)
        const isMine = data.sender === role;
        messageDiv.classList.add('message');
        messageDiv.classList.add(isMine ? 'user' : 'agent');
        messageDiv.innerText = data.message;

        chatLog.appendChild(messageDiv);
        chatLog.scrollTop = chatLog.scrollHeight;
    };

    document.querySelector('#chat-message-submit').onclick = function() {
        const inputDom = document.querySelector('#chat-message-input');
        const message = inputDom.value;

        if (message.trim() !== '') {
            chatSocket.send(JSON.stringify({
                'message': message,
                'sender': role  // 내가 보낸 사람 역할 추가
            }));
            inputDom.value = '';
        }
    };
</script>


</body>
</html>
