{% extends 'main/layout/sidebar_layout.html' %}
{% load static %}

{% block extra_css %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'consult_app/css/select_court.css' %}">
{% endblock %}

{% block sidebar_menu %}
<li><a href="{% url 'chatbot' %}">챗봇상담</a></li>
<li class="active"><a href="#">실시간고객지원</a></li>
{% endblock %}

{% block sidebar_content %}
<div class="select-court-container">
  <h2>실시간고객지원</h2>
  <hr style="width: 1000px; margin: 0;">

  <h3>상담을 원하는 법원을 선택하세요</h3>

  <form method="POST" action="{% url 'enter_court_room' %}" target="_blank">
    {% csrf_token %}
    <select name="court" required>
      <option value="" disabled selected>법원을 선택하세요</option>
      {% for court in court_list %}
        <option value="{{ court }}">{{ court }}</option>
      {% endfor %}
    </select>

    <button type="submit">입장하기</button>
  </form>
</div>
{% endblock %}
