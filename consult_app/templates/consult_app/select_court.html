<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>법원 선택</title>
</head>
<body>
    <h1>상담을 원하는 법원을 선택하세요</h1>
    <form method="POST" action="{% url 'enter_court_room' %}">
        {% csrf_token %}
        <select name="court" required>
            <option value="" disabled selected>법원을 선택하세요</option>
            {% for court in court_list %}
                <option value="{{ court }}">{{ court }}</option>
            {% endfor %}
        </select>
        <button type="submit">입장하기</button>
    </form>
</body>
</html>
