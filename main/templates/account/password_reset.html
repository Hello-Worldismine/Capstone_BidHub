{% extends "account/base.html" %}
{% load static %}

{% block extra_head %}
  {{ block.super }}
  <link rel="stylesheet" href="{% static 'css/pages/password_reset.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  {% endblock %}
{% load i18n %}

{% block content %}
<div class="login-container">
  <div class="login-box">
    <h2>비밀번호 재설정</h2>
    <p>가입 시 사용한 이메일 주소를 입력해주세요.</p>

    <form method="POST" action="{% url 'account_reset_password' %}">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit" class="btn-primary">비밀번호 재설정 메일 보내기</button>
    </form>

    <div class="extra-links" style="margin-top: 20px;">
      <a href="{% url 'account_login' %}">로그인하기</a> |
      <a href="{% url 'find_id' %}">아이디 찾기</a>
    </div>
  </div>
</div>
{% endblock %}
